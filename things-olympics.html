/* ── Helpers ── */
const PALETTE = ['#0081C8','#EE334E','#00A651','#FCB131','#7C3AED','#F97316','#0891B2','#BE185D'];
function colorFor(s = '') {
  let h = 0;
  for (const c of s) h = (h * 31 + c.charCodeAt(0)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}

/* ── Metadata parsing: tries multiple tag formats ── */
function parseOGMeta(html, url) {
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const q  = s => doc.querySelector(s)?.getAttribute('content')?.trim() || '';
    const qs = s => doc.querySelector(s)?.textContent?.trim() || '';

    // 1) Try JSON-LD (schema.org Product / Article / etc.)
    let jsonldName = '', jsonldImage = '', jsonldDesc = '';
    doc.querySelectorAll('script[type="application/ld+json"]').forEach(el => {
      try {
        const data = JSON.parse(el.textContent);
        const nodes = Array.isArray(data) ? data : (data['@graph'] || [data]);
        nodes.forEach(n => {
          if (!jsonldName && n.name)        jsonldName  = String(n.name).trim().slice(0, 120);
          if (!jsonldImage && n.image)      jsonldImage = (typeof n.image === 'string' ? n.image : n.image?.url || n.image?.[0]?.url || '');
          if (!jsonldDesc  && n.description) jsonldDesc = String(n.description).trim().slice(0, 200);
        });
      } catch {}
    });

    // 2) OG tags
    let image = q('meta[property="og:image"]') || q('meta[property="og:image:url"]')
              || q('meta[name="og:image"]')     || '';

    // 3) Twitter card fallbacks
    const twitterImage = q('meta[name="twitter:image"]') || q('meta[name="twitter:image:src"]') || '';
    const twitterTitle = q('meta[name="twitter:title"]') || '';
    const twitterDesc  = q('meta[name="twitter:description"]') || '';

    // 4) Resolve relative image URL
    const rawImage = image || twitterImage || jsonldImage || '';
    let finalImage = rawImage;
    if (finalImage && !/^https?:\/\//.test(finalImage)) {
      try { finalImage = new URL(finalImage, url).href; } catch {}
    }

    // 5) Pick best name / description in priority order
    const name = (
      q('meta[property="og:title"]') || q('meta[name="og:title"]') ||
      twitterTitle || jsonldName ||
      qs('h1') || doc.title ||
      new URL(url).hostname
    ).trim().slice(0, 120);

    const description = (
      q('meta[property="og:description"]') || q('meta[name="description"]') ||
      twitterDesc || jsonldDesc || ''
    ).trim().slice(0, 220);

    return { name, image: finalImage, description, url };
  } catch { return { name: new URL(url).hostname, image: '', description: '', url }; }
}

/* ── Primary: Microlink API (handles JS-rendered sites, clean JSON) ── */
async function fetchViaMicrolink(url) {
  const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&palette=false&audio=false&video=false&iframe=false`, { signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error('Microlink HTTP ' + res.status);
  const { status, data } = await res.json();
  if (status !== 'success' || !data) throw new Error('Microlink no data');
  const name  = (data.title  || '').trim().slice(0, 120);
  const image = data.image?.url || data.logo?.url || '';
  const description = (data.description || '').trim().slice(0, 220);
  if (!name) throw new Error('Microlink: empty title');
  return { name, image, description, url };
}

/* ── Fallback: allorigins proxy + local HTML parser ── */
async function fetchViaAllOrigins(url) {
  const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error('allorigins HTTP error');
  const { contents } = await res.json();
  if (!contents) throw new Error('allorigins: empty response');
  return parseOGMeta(contents, url);
}

/* ── Option B: Supabase Edge Function (server-side, no CORS, browser UA) ── */
async function fetchViaEdgeFunction(url) {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/fetch-meta`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ url }),
    signal: AbortSignal.timeout(14000),
  });
  if (!res.ok) throw new Error('Edge fn HTTP ' + res.status);
  const data = await res.json();
  if (!data.success) throw new Error('Edge fn: ' + data.error);
  if (!data.name)    throw new Error('Edge fn: empty name');
  return { name: data.name, image: data.image || '', description: data.description || '', url };
}

/* ── fetchMeta: Edge Function → Microlink → allorigins ── */
async function fetchMeta(rawUrl) {
  const url = /^https?:\/\//.test(rawUrl) ? rawUrl : 'https://' + rawUrl;
  try {
    return await fetchViaEdgeFunction(url);
  } catch (edgeErr) {
    console.warn('[fetchMeta] Edge fn failed, trying Microlink:', edgeErr.message);
    try {
      return await fetchViaMicrolink(url);
    } catch (microlinkErr) {
      console.warn('[fetchMeta] Microlink failed, trying allorigins:', microlinkErr.message);
      return await fetchViaAllOrigins(url);
    }
  }
}

/* ── Image resize (client-side, for upload) ── */
function resizeImage(file, maxPx = 520) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) { reject(new Error('Not an image')); return; }
    const img = new Image();
    const src = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxPx || h > maxPx) {
        if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else        { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(src);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => { URL.revokeObjectURL(src); reject(new Error('Load failed')); };
    img.src = src;
  });
}

/* ── Tournament Engine ── */
function startTourn(items) {
  const shuffled = [...items].sort(() => Math.random() - 0.5);
  return advance({ queue: shuffled, pending: [], losers: [], round: 1, played: 0, match: null, done: false, champ: null });
}
function advance(t) {
  if (t.queue.length >= 2) { const [a, b, ...rest] = t.queue; return { ...t, queue: rest, match: [a, b] }; }
  const winners = t.queue.length === 1 ? [...t.pending, t.queue[0]] : [...t.pending];
  if (winners.length <= 1) return { ...t, queue: [], pending: [], match: null, done: true, champ: winners[0] ?? null };
  return advance({ ...t, queue: winners, pending: [], round: t.round + 1 });
}
function choose(t, idx) {
  const [a, b] = t.match, win = idx === 0 ? a : b, lose = idx === 0 ? b : a;
  return advance({ ...t, pending: [...t.pending, win], losers: [lose, ...t.losers], played: t.played + 1, match: null });
}
function getRanking(t) { return [t.champ, ...t.losers].filter(Boolean); }

    try {
      if (mode === 'signup') {
        const { data, error: err } = await sb.auth.signUp({ email, password });

    if (!urlVal.trim() || fetching) return;
    setFetching(true); setFetchErr(''); setPreview(null);
    try { setPreview(await fetchMeta(urlVal.trim())); }
    catch { setFetchErr("Couldn't load that URL — try manual entry instead."); }
    finally { setFetching(false); }
  }

  async function addPreview() {
    if (!preview || !user) return;
    setSaving(true);
    const { data } = await sb.from('items').insert({ user_id: user.id, name: preview.name, image: preview.image, description: preview.description, url: preview.url }).select().single();
    if (data) { setItems(p => [data, ...p]); showToast('✓ Added!'); }
    setPreview(null); setUrlVal(''); setSaving(false);
  }

  async function addManual() {
    if (!form.name.trim() || !user) return;
    setSaving(true);
    const { data } = await sb.from('items').insert({ user_id: user.id, name: form.name, image: form.image, description: form.description, url: form.url }).select().single();
    if (data) { setItems(p => [data, ...p]); showToast('✓ Added!'); }
    clearManualForm(); setSaving(false);
  }

  async function removeItem(id) {
    await sb.from('items').delete().eq('id', id);
    setItems(p => p.filter(i => i.id !== id));
  }

  /* ── Inline edit state ── */
  const [editingId,   setEditingId]   = useState(null);
  const [editDraft,   setEditDraft]   = useState({});
  const [editImgPrev, setEditImgPrev] = useState('');
  const [editSaving,  setEditSaving]  = useState(false);
  const editFileRef = useRef(null);

  function openEdit(item) {
    setEditingId(item.id);
    setEditDraft({ name: item.name, description: item.description || '', url: item.url || '', image: item.image || '' });
    setEditImgPrev(item.image || '');
  }
  function closeEdit() { setEditingId(null); setEditDraft({}); setEditImgPrev(''); }

  async function handleEditImageFile(file) {
    try { const b64 = await resizeImage(file); setEditImgPrev(b64); setEditDraft(p => ({ ...p, image: b64 })); }
    catch {}
  }

  async function saveItem(id) {
    if (!editDraft.name.trim()) return;
    setEditSaving(true);
    const patch = { name: editDraft.name.trim(), description: editDraft.description.trim(), url: editDraft.url.trim(), image: editDraft.image };
    const { data } = await sb.from('items').update(patch).eq('id', id).select().single();
    if (data) { setItems(p => p.map(i => i.id === id ? data : i)); showToast('✓ Saved!'); }
    setEditSaving(false);
    closeEdit();
  }

  function startTournament() {
    if (items.length < 2) return;
    setTourn(startTourn(items)); setMatchKey(0); setScreen('tournament');
  }

  function doPick(idx) {
    if (picking || !tourn) return;
    setPicking(true);
    setTimeout(() => {
      const next = choose(tourn, idx);
      setTourn(next); setMatchKey(k => k + 1);
      if (next.done) setScreen('results');
      setPicking(false);
    }, 150);
  }

  function exitTournament() {
    setTourn(null); setScreen('collection');
  }

  function shareResults() {
    const ranked = getRanking(tourn);
    const text = '🏅 My Things Olympics Results:\n\n' +
      ranked.map((item, i) => `${ i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`} ${item.name}`).join('\n');
    if (navigator.share) {
      navigator.share({ title: 'Things Olympics Results', text }).catch(() => {});
    } else {
      navigator.clipboard?.writeText(text).then(() => showToast('📋 Results copied!')).catch(() => showToast('Could not copy'));
    }
  }

  /* ── Loading ── */
  if (authLoading) return (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(160deg, #06061a, #0d1b4b)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ textAlign: 'center', color: '#fff' }}>
        <div style={{ fontSize: '2.4rem', marginBottom: 18 }}>🏅</div>
        <Spinner size={26} color="#FCB131" />
      </div>
    </div>
  );

  if (!user) return <AuthScreen />;

  /* ── Tournament ── */
  if (screen === 'tournament' && tourn && !tourn.done && tourn.match) {
    const [a, b] = tourn.match;
    const total = items.length - 1;
    const maxRounds = Math.max(1, Math.ceil(Math.log2(items.length)));
    const pct = total > 0 ? (tourn.played / total) * 100 : 0;

    return (
      <div style={{ minHeight: '100vh', background: 'linear-gradient(160deg, #06061a 0%, #0d1b4b 55%, #1a062e 100%)', color: '#fff' }}>
        {/* Header */}
        <div style={{ padding: '14px 20px', borderBottom: '1px solid rgba(255,255,255,0.07)', display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ maxWidth: 840, margin: '0 auto', width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
            <div>
              <div style={{ color: '#FCB131', fontWeight: 700, fontSize: '0.67rem', letterSpacing: 3, textTransform: 'uppercase' }}>Round {tourn.round} of {maxRounds}</div>
              <div style={{ fontWeight: 800, fontSize: '1.1rem', marginTop: 1 }}>🏅 Things Olympics</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: '0.72rem', color: 'rgba(255,255,255,0.4)', marginBottom: 4 }}>Match {tourn.played + 1} / {total}</div>
                <div style={{ width: 130, height: 4, background: 'rgba(255,255,255,0.1)', borderRadius: 2 }}>
                  <div style={{ height: '100%', width: `${pct}%`, background: 'linear-gradient(90deg, #FCB131, #EE334E)', borderRadius: 2, transition: 'width 0.45s ease' }} />
                </div>
              </div>
              <button onClick={exitTournament} title="Exit tournament" style={{ background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.15)', color: 'rgba(255,255,255,0.6)', borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontSize: '0.78rem', fontWeight: 600, whiteSpace: 'nowrap' }}>
                ✕ Exit
              </button>
            </div>
          </div>
        </div>

        <div style={{ maxWidth: 840, margin: '0 auto', padding: '24px 16px 32px' }}>
          <p style={{ textAlign: 'center', color: 'rgba(255,255,255,0.55)', marginBottom: 18, fontSize: '0.9rem' }}>
            Which would you rather have? &nbsp;
            <span style={{ fontSize: '0.72rem', color: 'rgba(255,255,255,0.28)' }}>← → keys work too</span>
          </p>

          {/* VS Row — stacks on mobile via CSS */}
          <div key={matchKey} className="pop-in vs-row" style={{ display: 'flex', gap: 12, alignItems: 'stretch' }}>
            <VsCard item={a} onPick={() => !picking && doPick(0)} hint="← key" />
            {/* Divider */}
            <div className="vs-divider" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 6, flexShrink: 0 }}>
              <div className="vs-divider-line" style={{ width: 2, height: 40, background: 'rgba(255,255,255,0.08)', borderRadius: 1 }} />
              <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'linear-gradient(135deg, #EE334E, #FCB131)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, fontSize: '0.8rem', color: '#fff', boxShadow: '0 0 24px rgba(238,51,78,0.5)', flexShrink: 0 }}>VS</div>
              <div className="vs-divider-line" style={{ width: 2, height: 40, background: 'rgba(255,255,255,0.08)', borderRadius: 1 }} />
            </div>
            <VsCard item={b} onPick={() => !picking && doPick(1)} hint="→ key" />
          </div>

          {/* Eliminated — horizontally scrollable strip */}
          {tourn.losers.length > 0 && (
            <div className="fade-in" style={{ marginTop: 24 }}>
              <div style={{ fontSize: '0.64rem', color: 'rgba(255,255,255,0.3)', fontWeight: 700, letterSpacing: 2.5, textTransform: 'uppercase', marginBottom: 8 }}>Eliminated</div>
              <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 4 }}>
                {tourn.losers.map(l => (
                  <div key={l.id} style={{ display: 'flex', alignItems: 'center', gap: 5, background: 'rgba(255,255,255,0.06)', borderRadius: 30, padding: '3px 10px 3px 3px', flexShrink: 0 }}>
                    <Avatar item={l} size={18} />
                    <span style={{ fontSize: '0.72rem', color: 'rgba(255,255,255,0.45)', maxWidth: 100, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{l.name}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
        {toast && <Toast message={toast} />}
      </div>
    );
  }

  /* ── Results ── */
  if (screen === 'results' && tourn?.done) {
    const ranked = getRanking(tourn);
    const MEDALS = ['🥇','🥈','🥉'];
    const PODIUM_H  = [200, 160, 124];
    const PODIUM_BG = [
      'linear-gradient(180deg,#FFD700,#E09000)',
      'linear-gradient(180deg,#D8D8D8,#A8A8A8)',
      'linear-gradient(180deg,#CD7F32,#9A5520)',
    ];
    return (
      <div style={{ minHeight: '100vh', background: 'linear-gradient(180deg, #FFFBEB 0%, #f0f1f5 28%)' }}>
        <div style={{ maxWidth: 640, margin: '0 auto', padding: '32px 16px 48px' }}>

          {/* Hero */}
          <div className="slide-up" style={{ textAlign: 'center', marginBottom: 36 }}>
            <div style={{ fontSize: '3rem', marginBottom: 8 }}>🎉</div>
            <h1 style={{ fontSize: '1.85rem', fontWeight: 900, color: '#111', letterSpacing: -0.5 }}>Tournament Complete!</h1>
            {ranked[0] && <p style={{ color: '#999', marginTop: 8, fontSize: '0.88rem' }}>"{ranked[0].name}" takes the gold!</p>}
          </div>

          {/* Podium */}
          {ranked.length >= 2 && (
            <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: 8, marginBottom: 32 }}>
              {[1, 0, 2].map(rank => {
                if (!ranked[rank]) return <div key={rank} style={{ flex: 1, maxWidth: 180 }} />;
                return (
                  <div key={rank} className="slide-up" style={{ flex: 1, maxWidth: 180, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <Avatar item={ranked[rank]} size={60} />
                    <div style={{ fontWeight: 700, fontSize: '0.76rem', color: '#444', textAlign: 'center', maxWidth: 130, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', margin: '8px 0' }}>
                      {ranked[rank].name}
                    </div>
                    <div style={{ width: '100%', height: PODIUM_H[rank], background: PODIUM_BG[rank], borderRadius: '10px 10px 0 0', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2.1rem', boxShadow: '0 4px 16px rgba(0,0,0,0.12)' }}>
                      {MEDALS[rank]}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Full ranking */}
          <div style={{ background: '#fff', borderRadius: 18, padding: '18px 20px', boxShadow: '0 2px 24px rgba(0,0,0,0.07)', marginBottom: 16 }}>
            <h3 style={{ fontSize: '0.78rem', fontWeight: 700, color: '#aaa', letterSpacing: 1.8, textTransform: 'uppercase', marginBottom: 14 }}>Full Rankings</h3>
            {ranked.map((item, i) => (
              <div key={item.id} className="fade-in" style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '9px 0', borderBottom: i < ranked.length - 1 ? '1px solid #f3f3f3' : 'none' }}>
                <div style={{ width: 30, textAlign: 'center', flexShrink: 0, fontWeight: 700, fontSize: i < 3 ? '1.2rem' : '0.8rem', color: i < 3 ? undefined : '#ddd' }}>
                  {i < 3 ? MEDALS[i] : i + 1}
                </div>
                <Avatar item={item} size={40} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, color: '#111', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: '0.88rem' }}>{item.name}</div>
                  {item.url && <a href={item.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.7rem', color: '#0081C8' }}>View item ↗</a>}
                </div>
              </div>
            ))}
          </div>

          {/* Actions */}
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={shareResults} style={{ flex: 1, padding: '13px', border: 'none', borderRadius: 12, cursor: 'pointer', background: '#fff', color: '#333', fontWeight: 700, fontSize: '0.88rem', boxShadow: '0 2px 12px rgba(0,0,0,0.08)' }}>
              📤 Share
            </button>
            <button onClick={() => { setTourn(startTourn(items)); setMatchKey(0); setScreen('tournament'); }} style={{ flex: 1, padding: '13px', border: 'none', borderRadius: 12, cursor: 'pointer', background: 'linear-gradient(135deg, #0081C8, #00A651)', color: '#fff', fontWeight: 700, fontSize: '0.88rem' }}>
              🔄 Rematch
            </button>
            <button onClick={() => setScreen('collection')} style={{ flex: 1, padding: '13px', border: 'none', borderRadius: 12, cursor: 'pointer', background: '#e8e9ec', color: '#444', fontWeight: 700, fontSize: '0.88rem' }}>
              ✏️ Edit
            </button>
          </div>
        </div>
        {toast && <Toast message={toast} />}
      </div>
    );
  }

  /* ── Collection ── */
  const needMore = items.length === 1;
  const canStart = items.length >= 2;

  return (
    <div style={{ minHeight: '100vh', background: '#f0f1f5', paddingBottom: canStart ? 84 : 0 }}>

      {/* Header */}
      <div style={{ background: 'linear-gradient(135deg, #06061a 0%, #0d1b4b 65%, #0a3d7a 100%)', color: '#fff', padding: '16px 18px 20px' }}>
        <div style={{ maxWidth: 640, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
              <span style={{ fontSize: '1.7rem' }}>🏅</span>
              <div>
                <h1 style={{ fontWeight: 900, fontSize: '1.2rem', letterSpacing: -0.3 }}>Things Olympics</h1>
                <p style={{ opacity: 0.45, fontSize: '0.72rem', marginTop: 1 }}>{user.email}</p>
              </div>
            </div>
            <button onClick={() => sb.auth.signOut()} style={{ padding: '6px 13px', background: 'rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.65)', border: '1px solid rgba(255,255,255,0.14)', borderRadius: 8, cursor: 'pointer', fontSize: '0.75rem', fontWeight: 600 }}>
              Sign out
            </button>
          </div>
          <div style={{ display: 'flex', gap: 5, marginTop: 14 }}>
            {['#0081C8','#FCB131','#e8e8e8','#00A651','#EE334E'].map((c, i) => (
              <div key={i} style={{ width: 17, height: 17, borderRadius: '50%', border: `3px solid ${c}`, opacity: 0.75 }} />
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 640, margin: '0 auto', padding: '18px 16px' }}>

        {/* Add Item — collapsible */}
        <div style={{ background: '#fff', borderRadius: 16, marginBottom: 16, boxShadow: '0 1px 16px rgba(0,0,0,0.06)', overflow: 'hidden' }}>
          {/* Toggle header */}
          <button onClick={() => setShowForm(p => !p)} style={{ width: '100%', padding: '14px 18px', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontWeight: 700, fontSize: '0.92rem', color: '#222' }}>➕ Add Competitors</span>
            <span style={{ fontSize: '0.75rem', color: '#aaa', fontWeight: 600, transition: 'transform 0.2s', display: 'inline-block', transform: showForm ? 'rotate(180deg)' : 'none' }}>▼</span>
          </button>

          {showForm && (
            <div style={{ padding: '0 18px 18px' }}>
              {/* Tabs */}
              <div style={{ display: 'flex', background: '#f0f1f5', borderRadius: 10, padding: 4, marginBottom: 15 }}>
                {[['url','🔗 From URL'],['manual','✏️ Manual']].map(([key, label]) => (
                  <button key={key} onClick={() => { setTab(key); setFetchErr(''); setPreview(null); }} style={{ flex: 1, padding: '8px', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontSize: '0.83rem', transition: 'all 0.15s', background: tab === key ? '#fff' : 'transparent', color: tab === key ? '#0081C8' : '#999', boxShadow: tab === key ? '0 2px 8px rgba(0,0,0,0.08)' : 'none' }}>
                    {label}
                  </button>
                ))}
              </div>

              {tab === 'url' && (
                <div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <input value={urlVal} onChange={e => setUrlVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && onFetch()}
                      placeholder="Paste any URL (Amazon, Etsy…)"
                      style={{ flex: 1, padding: '10px 13px', border: '1.5px solid #e5e7eb', borderRadius: 10, fontSize: '0.87rem' }} />
                    <button onClick={onFetch} disabled={fetching || !urlVal.trim()} style={{ padding: '10px 14px', background: '#0081C8', color: '#fff', border: 'none', borderRadius: 10, fontWeight: 700, cursor: fetching || !urlVal.trim() ? 'not-allowed' : 'pointer', opacity: fetching || !urlVal.trim() ? 0.5 : 1, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 5, fontSize: '0.87rem' }}>
                      {fetching ? <><Spinner size={13} color="#fff" />Fetching</> : 'Fetch'}
                    </button>
                  </div>
                  {fetchErr && <p style={{ marginTop: 7, color: '#EE334E', fontSize: '0.79rem' }}>{fetchErr}</p>}
                  <p style={{ marginTop: 6, fontSize: '0.72rem', color: '#ccc' }}>Works with Amazon, Etsy, most product pages &amp; websites</p>

                  {preview && (
                    <div className="pop-in" style={{ marginTop: 13, border: '1.5px solid #e5e7eb', borderRadius: 12, overflow: 'hidden' }}>
                      <div style={{ display: 'flex', gap: 11, padding: 13 }}>
                        <Avatar item={preview} size={56} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 700, fontSize: '0.87rem', color: '#111' }}>{preview.name}</div>
                          {preview.description && <div style={{ color: '#888', fontSize: '0.76rem', marginTop: 3, overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical' }}>{preview.description}</div>}
                        </div>
                      </div>
                      <div style={{ display: 'flex', gap: 7, padding: '0 13px 13px' }}>
                        <button onClick={addPreview} disabled={saving} style={{ flex: 1, padding: '8px', background: '#00A651', color: '#fff', border: 'none', borderRadius: 9, fontWeight: 700, cursor: saving ? 'not-allowed' : 'pointer', opacity: saving ? 0.7 : 1, fontSize: '0.84rem', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5 }}>
                          {saving ? <><Spinner size={12} color="#fff" />Saving…</> : '✓ Add to List'}
                        </button>
                        <button onClick={() => setPreview(null)} style={{ padding: '8px 12px', background: '#f0f1f5', border: 'none', borderRadius: 9, cursor: 'pointer', color: '#777' }}>✕</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {tab === 'manual' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {/* Name */}
                  <input value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))}
                    placeholder="Name *" style={{ padding: '10px 13px', border: '1.5px solid #e5e7eb', borderRadius: 10, fontSize: '0.87rem' }} />

                  {/* Image upload zone */}
                  <div>
                    <input ref={fileInputRef} type="file" accept="image/*" style={{ display: 'none' }}
                      onChange={e => e.target.files[0] && handleImageFile(e.target.files[0])} />

                    {imgPreview ? (
                      /* Preview */
                      <div style={{ position: 'relative', borderRadius: 10, overflow: 'hidden', border: '1.5px solid #e5e7eb' }}>
                        <img src={imgPreview} alt="preview" style={{ width: '100%', maxHeight: 180, objectFit: 'cover', display: 'block' }} />
                        <button onClick={() => { setImgPreview(''); setForm(p => ({ ...p, image: '' })); }}
                          style={{ position: 'absolute', top: 7, right: 7, width: 26, height: 26, borderRadius: '50%', background: 'rgba(0,0,0,0.55)', color: '#fff', border: 'none', cursor: 'pointer', fontWeight: 700, fontSize: '0.72rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          ✕
                        </button>
                        <button onClick={() => fileInputRef.current?.click()}
                          style={{ position: 'absolute', bottom: 7, right: 7, background: 'rgba(0,0,0,0.55)', color: '#fff', border: 'none', borderRadius: 8, padding: '4px 10px', cursor: 'pointer', fontSize: '0.72rem', fontWeight: 600 }}>
                          Change
                        </button>
                      </div>
                    ) : (
                      /* Drop zone */
                      <div
                        onClick={() => fileInputRef.current?.click()}
                        onDragEnter={e => { e.preventDefault(); setDragging(true); }}
                        onDragOver={e => { e.preventDefault(); setDragging(true); }}
                        onDragLeave={() => setDragging(false)}
                        onDrop={e => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if (f) handleImageFile(f); }}
                        style={{
                          border: `2px dashed ${dragging ? '#0081C8' : '#d1d5db'}`,
                          borderRadius: 10, padding: '20px 12px', textAlign: 'center', cursor: 'pointer',
                          background: dragging ? '#EFF6FF' : '#fafafa',
                          transition: 'all 0.15s',
                        }}>
                        <div style={{ fontSize: '1.6rem', marginBottom: 6 }}>📷</div>
                        <div style={{ fontSize: '0.83rem', fontWeight: 600, color: dragging ? '#0081C8' : '#555' }}>
                          {dragging ? 'Drop to upload' : 'Drag & drop an image'}
                        </div>
                        <div style={{ fontSize: '0.73rem', color: '#aaa', marginTop: 3 }}>or <span style={{ color: '#0081C8', fontWeight: 600 }}>click to browse</span></div>
                      </div>
                    )}
                    {imgErr && <p style={{ marginTop: 5, color: '#EE334E', fontSize: '0.76rem' }}>{imgErr}</p>}

                    {/* URL fallback */}
                    {!imgPreview && (
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 7 }}>
                        <div style={{ flex: 1, height: 1, background: '#e5e7eb' }} />
                        <span style={{ fontSize: '0.7rem', color: '#ccc', flexShrink: 0 }}>or paste URL</span>
                        <div style={{ flex: 1, height: 1, background: '#e5e7eb' }} />
                      </div>
                    )}
                    {!imgPreview && (
                      <input value={form.image} onChange={e => setForm(p => ({ ...p, image: e.target.value }))}
                        placeholder="https://…" style={{ marginTop: 7, width: '100%', padding: '9px 13px', border: '1.5px solid #e5e7eb', borderRadius: 10, fontSize: '0.83rem' }} />
                    )}
                  </div>

                  {/* Description & URL */}
                  <input value={form.description} onChange={e => setForm(p => ({ ...p, description: e.target.value }))}
                    placeholder="Description (optional)" style={{ padding: '10px 13px', border: '1.5px solid #e5e7eb', borderRadius: 10, fontSize: '0.87rem' }} />
                  <input value={form.url} onChange={e => setForm(p => ({ ...p, url: e.target.value }))}
                    onKeyDown={e => e.key === 'Enter' && addManual()}
                    placeholder="Link (optional)" style={{ padding: '10px 13px', border: '1.5px solid #e5e7eb', borderRadius: 10, fontSize: '0.87rem' }} />

                  <button onClick={addManual} disabled={!form.name.trim() || saving} style={{ padding: '10px', background: '#0081C8', color: '#fff', border: 'none', borderRadius: 10, fontWeight: 700, cursor: !form.name.trim() || saving ? 'not-allowed' : 'pointer', opacity: !form.name.trim() || saving ? 0.5 : 1, fontSize: '0.88rem', marginTop: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                    {saving ? <><Spinner size={13} color="#fff" />Saving…</> : '+ Add Item'}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Items list */}
        {itemsLoading ? (
          <div style={{ textAlign: 'center', padding: '44px 0' }}><Spinner size={26} /></div>
        ) : items.length > 0 ? (
          <div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 11, padding: '0 2px' }}>
              <h2 style={{ fontSize: '0.78rem', fontWeight: 700, color: '#aaa', letterSpacing: 1.8, textTransform: 'uppercase' }}>
                Competitors — {items.length} {items.length === 1 ? 'item' : 'items'}
              </h2>
              {needMore && <span style={{ fontSize: '0.75rem', color: '#FCB131', fontWeight: 600 }}>Add 1 more to start ↑</span>}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {items.map(item => (
                <div key={item.id} className="fade-in" style={{ background: '#fff', borderRadius: 13, boxShadow: '0 1px 8px rgba(0,0,0,0.05)', overflow: 'hidden' }}>
                  {editingId === item.id ? (
                    /* ── Inline edit form ── */
                    <div style={{ padding: '14px 14px 12px' }}>
                      {/* Image preview + swap */}
                      <div style={{ display: 'flex', gap: 10, marginBottom: 10, alignItems: 'flex-start' }}>
                        <div style={{ position: 'relative', flexShrink: 0 }}>
                          {editImgPrev
                            ? <img src={editImgPrev} alt="" style={{ width: 56, height: 56, objectFit: 'cover', borderRadius: 8, display: 'block' }} />
                            : <div style={{ width: 56, height: 56, borderRadius: 8, background: colorFor(editDraft.name || '?'), display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800, fontSize: '1.3rem' }}>{(editDraft.name?.[0] || '?').toUpperCase()}</div>
                          }
                          <button onClick={() => editFileRef.current?.click()} title="Change image" style={{ position: 'absolute', bottom: -4, right: -4, width: 20, height: 20, borderRadius: '50%', background: '#0081C8', color: '#fff', border: 'none', cursor: 'pointer', fontSize: '0.6rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>📷</button>
                          <input ref={editFileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => { if (e.target.files?.[0]) handleEditImageFile(e.target.files[0]); e.target.value=''; }} />
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <input
                            value={editDraft.name || ''}
                            onChange={e => setEditDraft(p => ({ ...p, name: e.target.value }))}
                            placeholder="Name *"
                            style={{ width: '100%', padding: '6px 9px', border: '1.5px solid #e0e0e0', borderRadius: 7, fontSize: '0.88rem', fontWeight: 600, boxSizing: 'border-box', outline: 'none' }}
                          />
                        </div>
                      </div>
                      {/* Image URL input when no upload */}
                      {!editImgPrev && (
                        <input
                          value={editDraft.image || ''}
                          onChange={e => setEditDraft(p => ({ ...p, image: e.target.value }))}
                          placeholder="Image URL (optional)"
                          style={{ width: '100%', padding: '6px 9px', border: '1.5px solid #e0e0e0', borderRadius: 7, fontSize: '0.8rem', boxSizing: 'border-box', marginBottom: 7, outline: 'none' }}
                        />
                      )}
                      <input
                        value={editDraft.description || ''}
                        onChange={e => setEditDraft(p => ({ ...p, description: e.target.value }))}
                        placeholder="Description (optional)"
                        style={{ width: '100%', padding: '6px 9px', border: '1.5px solid #e0e0e0', borderRadius: 7, fontSize: '0.8rem', boxSizing: 'border-box', marginBottom: 7, outline: 'none' }}
                      />
                      <input
                        value={editDraft.url || ''}
                        onChange={e => setEditDraft(p => ({ ...p, url: e.target.value }))}
                        placeholder="URL (optional)"
                        style={{ width: '100%', padding: '6px 9px', border: '1.5px solid #e0e0e0', borderRadius: 7, fontSize: '0.8rem', boxSizing: 'border-box', marginBottom: 10, outline: 'none' }}
                      />
                      <div style={{ display: 'flex', gap: 7, justifyContent: 'flex-end' }}>
                        <button onClick={closeEdit} style={{ padding: '6px 14px', borderRadius: 7, border: '1.5px solid #e0e0e0', background: '#fff', color: '#666', fontSize: '0.8rem', cursor: 'pointer', fontWeight: 600 }}>Cancel</button>
                        <button onClick={() => saveItem(item.id)} disabled={editSaving || !editDraft.name?.trim()} style={{ padding: '6px 16px', borderRadius: 7, border: 'none', background: editSaving || !editDraft.name?.trim() ? '#ccc' : '#0081C8', color: '#fff', fontSize: '0.8rem', cursor: editSaving || !editDraft.name?.trim() ? 'not-allowed' : 'pointer', fontWeight: 700 }}>
                          {editSaving ? 'Saving…' : 'Save'}
                        </button>
                      </div>
                    </div>
                  ) : (
                    /* ── Normal row ── */
                    <div style={{ padding: '11px 14px', display: 'flex', alignItems: 'center', gap: 11 }}>
                      <Avatar item={item} size={44} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 600, color: '#111', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: '0.88rem' }}>{item.name}</div>
                        {item.url
                          ? <a href={item.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.69rem', color: '#0081C8', display: 'block', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.url.slice(0, 50)}{item.url.length > 50 ? '…' : ''}</a>
                          : item.description && <p style={{ fontSize: '0.69rem', color: '#bbb', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', margin: 0 }}>{item.description}</p>
                        }
                      </div>
                      <button onClick={() => openEdit(item)} title="Edit" style={{ width: 26, height: 26, borderRadius: '50%', background: '#e8f4ff', color: '#0081C8', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: '0.78rem' }}>✎</button>
                      <button onClick={() => removeItem(item.id)} style={{ width: 26, height: 26, borderRadius: '50%', background: '#fee2e2', color: '#EE334E', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: '0.68rem', fontWeight: 700 }}>✕</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        ) : (
          /* Empty state */
          <div style={{ background: '#fff', borderRadius: 18, padding: '36px 24px', boxShadow: '0 1px 16px rgba(0,0,0,0.06)', textAlign: 'center' }}>
            <div style={{ fontSize: '2.8rem', marginBottom: 12 }}>🛍️</div>
            <h3 style={{ fontSize: '1.05rem', fontWeight: 700, color: '#333', marginBottom: 6 }}>Nothing here yet!</h3>
            <p style={{ color: '#bbb', fontSize: '0.83rem', marginBottom: 28 }}>Add things you want above to get started</p>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
              {[['➕','Add items','Paste a link or type a name'],['⚔️','Battle 1v1','Pick your favorite each round'],['🏆','Crown winner','See the full ranking']].map(([emoji, title, desc]) => (
                <div key={title} style={{ width: 130, textAlign: 'center' }}>
                  <div style={{ width: 40, height: 40, borderRadius: '50%', background: '#f0f1f5', margin: '0 auto 8px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.2rem' }}>{emoji}</div>
                  <div style={{ fontWeight: 700, fontSize: '0.82rem', color: '#333', marginBottom: 3 }}>{title}</div>
                  <div style={{ fontSize: '0.72rem', color: '#bbb', lineHeight: 1.4 }}>{desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Sticky "Start Tournament" bar */}
      {canStart && (
        <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, padding: '12px 16px', background: 'rgba(240,241,245,0.92)', backdropFilter: 'blur(12px)', borderTop: '1px solid rgba(0,0,0,0.07)', zIndex: 50 }}>
          <div style={{ maxWidth: 640, margin: '0 auto' }}>
            <button onClick={startTournament}
              onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.015)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
              style={{ width: '100%', padding: '14px', background: 'linear-gradient(135deg, #FCB131, #EE334E)', color: '#fff', border: 'none', borderRadius: 14, fontWeight: 800, cursor: 'pointer', fontSize: '1rem', boxShadow: '0 6px 20px rgba(238,51,78,0.35)', transition: 'transform 0.15s', letterSpacing: 0.3 }}>
              🏆 Start Tournament &nbsp;·&nbsp; {items.length} competitors
            </button>
          </div>
        </div>
      )}

      {toast && <Toast message={toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
